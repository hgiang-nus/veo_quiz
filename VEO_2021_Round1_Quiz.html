<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VEO 2021 – Round 1 Practice Quiz</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Source+Sans+3:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #F7F5F0;
  --card: #FFFFFF;
  --accent: #6B3A2A;
  --accent-light: #F3EAE4;
  --accent-mid: #8B5E3C;
  --gold: #C8963E;
  --text: #1E1E1E;
  --text-muted: #7A7570;
  --correct: #1B7A4A;
  --correct-bg: #E6F5EC;
  --wrong: #B33A3A;
  --wrong-bg: #FDEAEA;
  --border: #DDD8CE;
  --radius: 12px;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Source Sans 3', sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; }

/* ─── Hero ─── */
.hero {
  background: linear-gradient(135deg, #6B3A2A 0%, #3D1F15 100%);
  color: white; padding: 2.5rem 1.5rem 2rem; text-align: center;
  position: relative; overflow: hidden;
}
.hero::after {
  content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 3px;
  background: linear-gradient(90deg, var(--gold), #E8C97A, var(--gold));
}
.hero h1 { font-family: 'DM Serif Display', serif; font-size: clamp(1.7rem, 5vw, 2.5rem); margin-bottom: 0.25rem; }
.hero .subtitle { font-size: 1rem; opacity: 0.7; }
.hero .badges { display: flex; gap: 0.5rem; justify-content: center; flex-wrap: wrap; margin-top: 0.8rem; }
.hero .badge { padding: 0.25rem 0.75rem; border-radius: 20px; font-size: 0.78rem; font-weight: 600; letter-spacing: 0.04em; }
.badge-q { background: rgba(200,150,62,0.2); border: 1px solid rgba(200,150,62,0.4); color: #E8C97A; }
.badge-t { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: rgba(255,255,255,0.75); }

/* ─── Timer bar ─── */
.timer-bar {
  position: sticky; top: 0; z-index: 100;
  background: var(--card); border-bottom: 1px solid var(--border);
  padding: 0.5rem 1.25rem;
  display: flex; align-items: center; gap: 1rem;
  box-shadow: 0 2px 12px rgba(0,0,0,0.04);
}
.timer-left { display: flex; align-items: center; gap: 0.6rem; flex: 1; }
.progress-track { flex: 1; height: 7px; background: #EAE6DF; border-radius: 4px; overflow: hidden; }
.progress-fill { height: 100%; width: 0%; background: linear-gradient(90deg, var(--accent), var(--accent-mid)); border-radius: 4px; transition: width 0.4s; }
.progress-text { font-size: 0.8rem; font-weight: 600; color: var(--text-muted); white-space: nowrap; }
.timer-clock {
  display: flex; align-items: center; gap: 0.4rem;
  font-size: 0.95rem; font-weight: 700;
  font-variant-numeric: tabular-nums;
  padding: 0.35rem 0.75rem;
  background: var(--accent-light); border-radius: 8px;
  color: var(--accent); min-width: 115px; justify-content: center;
}
.timer-clock.warning { background: #FFF3E0; color: #E65100; animation: pulse 1s infinite; }
.timer-clock.danger { background: var(--wrong-bg); color: var(--wrong); animation: pulse 0.5s infinite; }
.timer-clock svg { width: 16px; height: 16px; flex-shrink: 0; }
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.7; } }

.timer-controls {
  display: flex; align-items: center; gap: 0.4rem;
}
.timer-btn {
  width: 32px; height: 32px; border-radius: 8px; border: 1px solid var(--border);
  background: var(--card); cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: all 0.2s; color: var(--text-muted);
}
.timer-btn:hover { background: var(--accent-light); color: var(--accent); border-color: var(--accent); }
.timer-btn svg { width: 14px; height: 14px; }

/* ─── Timer setup overlay ─── */
.timer-setup {
  background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 1.75rem; margin-bottom: 1.5rem; text-align: center;
}
.timer-setup h3 { font-family: 'DM Serif Display', serif; font-size: 1.2rem; color: var(--accent); margin-bottom: 0.3rem; }
.timer-setup p { font-size: 0.9rem; color: var(--text-muted); margin-bottom: 1rem; }
.time-options { display: flex; gap: 0.6rem; justify-content: center; flex-wrap: wrap; margin-bottom: 1rem; }
.time-opt {
  padding: 0.6rem 1.2rem; border-radius: 10px; border: 1.5px solid var(--border);
  background: var(--bg); cursor: pointer; font-family: inherit; font-size: 0.92rem;
  font-weight: 600; color: var(--text); transition: all 0.2s;
}
.time-opt:hover, .time-opt.active { border-color: var(--accent); background: var(--accent-light); color: var(--accent); }
.start-btn {
  padding: 0.7rem 2.5rem; border: none; border-radius: 10px;
  background: var(--accent); color: white; font-family: inherit;
  font-size: 1rem; font-weight: 600; cursor: pointer; transition: background 0.2s;
}
.start-btn:hover { background: var(--accent-mid); }
.no-timer-link { display: block; margin-top: 0.6rem; font-size: 0.85rem; color: var(--text-muted); cursor: pointer; text-decoration: underline; border: none; background: none; font-family: inherit; }

/* ─── Container ─── */
.container { max-width: 780px; margin: 0 auto; padding: 1.5rem 1.25rem 4rem; }

.section-label {
  font-family: 'DM Serif Display', serif; font-size: 1.25rem; color: var(--accent);
  margin: 2rem 0 1rem; padding-bottom: 0.5rem; border-bottom: 2px solid var(--accent-light);
}

/* ─── Question card ─── */
.q-card {
  background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 1.5rem; margin-bottom: 1.15rem; transition: border-color 0.3s, box-shadow 0.3s;
}
.q-card:hover { box-shadow: 0 4px 18px rgba(0,0,0,0.04); }
.q-card.answered-correct { border-color: var(--correct); }
.q-card.answered-wrong { border-color: var(--wrong); }

.q-header { display: flex; align-items: center; gap: 0.6rem; margin-bottom: 0.6rem; }
.q-number {
  width: 30px; height: 30px; display: inline-flex; align-items: center; justify-content: center;
  background: var(--accent); color: white; font-size: 0.78rem; font-weight: 700;
  border-radius: 50%; flex-shrink: 0;
}
.q-card.answered-correct .q-number { background: var(--correct); }
.q-card.answered-wrong .q-number { background: var(--wrong); }
.q-topic { font-size: 0.72rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-muted); background: #F0EDE6; padding: 0.15rem 0.55rem; border-radius: 10px; }

.q-text { font-size: 1rem; font-weight: 600; margin-bottom: 1rem; line-height: 1.6; }
.options { display: flex; flex-direction: column; gap: 0.45rem; }
.option-btn {
  display: flex; align-items: flex-start; gap: 0.7rem;
  padding: 0.8rem 1rem; background: var(--bg); border: 1.5px solid transparent;
  border-radius: 10px; cursor: pointer; font-size: 0.93rem; line-height: 1.5;
  text-align: left; transition: all 0.2s; font-family: inherit; color: var(--text); width: 100%;
}
.option-btn:hover:not(:disabled) { border-color: var(--accent); background: var(--accent-light); }
.option-btn .letter {
  flex-shrink: 0; width: 25px; height: 25px; display: flex; align-items: center; justify-content: center;
  border-radius: 50%; background: white; border: 1.5px solid var(--border);
  font-weight: 700; font-size: 0.78rem; color: var(--text-muted); transition: all 0.2s;
}
.option-btn:hover:not(:disabled) .letter { border-color: var(--accent); color: var(--accent); }
.option-btn.selected-correct { background: var(--correct-bg); border-color: var(--correct); }
.option-btn.selected-correct .letter { background: var(--correct); border-color: var(--correct); color: white; }
.option-btn.selected-wrong { background: var(--wrong-bg); border-color: var(--wrong); }
.option-btn.selected-wrong .letter { background: var(--wrong); border-color: var(--wrong); color: white; }
.option-btn.show-correct { background: var(--correct-bg); border-color: var(--correct); }
.option-btn.show-correct .letter { background: var(--correct); border-color: var(--correct); color: white; }
.option-btn:disabled { cursor: default; }

.explanation {
  margin-top: 0.9rem; padding: 0.9rem 1rem; border-radius: 10px;
  font-size: 0.9rem; line-height: 1.6; display: none;
}
.explanation.show { display: block; animation: fadeIn 0.3s ease; }
.explanation.correct-expl { background: var(--correct-bg); border-left: 4px solid var(--correct); color: #155D35; }
.explanation.wrong-expl { background: var(--wrong-bg); border-left: 4px solid var(--wrong); color: #8A2222; }
.explanation strong { font-weight: 700; }

@keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

/* ─── Results ─── */
.results-panel {
  display: none; background: var(--card); border: 2px solid var(--gold);
  border-radius: var(--radius); padding: 2rem; text-align: center; margin-top: 2rem;
}
.results-panel.show { display: block; animation: fadeIn 0.4s ease; }
.results-panel h2 { font-family: 'DM Serif Display', serif; font-size: 1.5rem; color: var(--accent); margin-bottom: 0.25rem; }
.score-display { font-size: 3rem; font-weight: 700; color: var(--accent); margin: 0.5rem 0; }
.score-display span { color: var(--text-muted); font-size: 1.5rem; }
.score-sub { font-size: 0.95rem; color: var(--text-muted); margin-bottom: 1.2rem; }
.score-row { display: flex; justify-content: center; gap: 2rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
.score-stat { text-align: center; }
.score-stat .num { font-size: 1.3rem; font-weight: 700; }
.score-stat .lbl { font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em; }
.score-stat.green .num { color: var(--correct); }
.score-stat.red .num { color: var(--wrong); }
.score-stat.time .num { color: var(--accent); }
.btn-restart {
  padding: 0.7rem 2rem; background: var(--accent); color: white; border: none;
  border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer;
  font-family: inherit; transition: background 0.2s;
}
.btn-restart:hover { background: var(--accent-mid); }

.footer-note { text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-muted); }

.hidden { display: none !important; }

@media (max-width: 600px) {
  .hero { padding: 2rem 1rem 1.5rem; }
  .container { padding: 1rem 1rem 3rem; }
  .q-card { padding: 1.2rem; }
  .timer-bar { padding: 0.4rem 0.75rem; gap: 0.5rem; }
  .timer-clock { font-size: 0.82rem; min-width: 100px; padding: 0.3rem 0.5rem; }
}
</style>
</head>
<body>

<div class="hero">
  <h1>Vietnam Economics Olympiad 2021</h1>
  <p class="subtitle">Round 1 – Practice Quiz</p>
  <div class="badges">
    <div class="badge badge-q">20 MCQ QUESTIONS</div>
    <div class="badge badge-t">TIMED QUIZ</div>
  </div>
</div>

<div class="timer-bar">
  <div class="timer-left">
    <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
    <div class="progress-text" id="progressText">0 / 20</div>
  </div>
  <div class="timer-clock" id="timerClock">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
    <span id="timerDisplay">--:--</span>
  </div>
  <div class="timer-controls">
    <button class="timer-btn" id="pauseBtn" title="Pause/Resume" onclick="togglePause()">
      <svg viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
    </button>
  </div>
</div>

<div class="container">
  <div id="timerSetup" class="timer-setup">
    <h3>Set Your Timer</h3>
    <p>Choose a time limit for the quiz, or practice without one.</p>
    <div class="time-options">
      <button class="time-opt" onclick="selectTime(15)">15 min</button>
      <button class="time-opt active" onclick="selectTime(30)">30 min</button>
      <button class="time-opt" onclick="selectTime(45)">45 min</button>
      <button class="time-opt" onclick="selectTime(60)">60 min</button>
    </div>
    <button class="start-btn" onclick="startQuiz()">Start Quiz</button>
    <button class="no-timer-link" onclick="startQuiz(true)">Practice without timer</button>
  </div>

  <div id="quizContainer" class="hidden"></div>
</div>

<script>
const questions = [
  {
    id: 1, topic: "Principles",
    text: "Which are the contents that Macroeconomics study?",
    options: [
      "Variables of the whole economy.",
      "Consumers' choices between fish and beef.",
      "What a strike by the United Auto Workers affects General Motors.",
      "The decision that government makes relating to supports for price of lychee."
    ],
    correct: 0,
    explanation: "<strong>Macroeconomics</strong> studies the economy as a whole — aggregate output (GDP), unemployment, inflation, and national income. Options B and C deal with individual markets or firms (microeconomics). Option D (lychee price support) is also a micro-level market intervention, even though it involves the government."
  },
  {
    id: 2, topic: "Principles",
    text: "When you rent a house to stay and run a shop selling ordered goods with a monthly rental fee of 15 million VND, who benefits from this transaction?",
    options: [
      "Only you.",
      "Only the landlord.",
      "Both you and the landlord.",
      "Neither you nor the landlord."
    ],
    correct: 2,
    explanation: "A fundamental principle of economics: <strong>voluntary exchange benefits both parties</strong>. You benefit because the house is worth more to you (for living + business) than the 15M VND rent. The landlord benefits because 15M VND exceeds their next-best alternative use of the property. If either party didn't benefit, they would not agree to the transaction."
  },
  {
    id: 3, topic: "Opportunity Cost",
    text: "After graduation from high school, Lan decided to enroll in a four-year university program rather than accept a job offering $8,500/year. If annual tuition is $6,000 and Lan borrows at 8%/year interest, which is closest to the total opportunity cost of attending university after four years?",
    options: [
      "$34,000",
      "$58,000",
      "$61,000",
      "$65,000"
    ],
    correct: 2,
    explanation: "The opportunity cost has two components:<br><br><strong>1. Foregone salary:</strong> $8,500 × 4 = $34,000<br><strong>2. Tuition with loan interest</strong> (compounding at 8%):<br>Year 1: $6,000 × 1.08³ = $7,558<br>Year 2: $6,000 × 1.08² = $6,998<br>Year 3: $6,000 × 1.08¹ = $6,480<br>Year 4: $6,000<br>Total tuition burden: ≈ $27,037<br><br><strong>Grand total: $34,000 + $27,037 ≈ $61,000</strong>"
  },
  {
    id: 4, topic: "Policy",
    text: "Which policy would be sensible to promote innovation in the information technology industry?",
    options: [
      "Placing a tax on all new inventions in the IT industry.",
      "Investing in more research and development in the IT industry.",
      "Increasing government regulation of the IT industry.",
      "All of the above policies."
    ],
    correct: 1,
    explanation: "<strong>R&D investment</strong> directly promotes innovation by funding the discovery and development of new technologies. Taxing inventions (A) would <em>discourage</em> innovation by raising costs. Increasing regulation (C) typically adds barriers, slowing innovation. Only B provides the positive incentive needed to foster technological progress."
  },
  {
    id: 5, topic: "Financial Markets",
    text: "The stock market as an institution is the place where people invest to reach their economic objectives. This institution's presence:",
    options: [
      "Makes the price of stocks increase.",
      "Assists predict stock earnings.",
      "Helps everyone joining get money.",
      "Brings buyers and sellers of stocks together."
    ],
    correct: 3,
    explanation: "The stock market's fundamental role as an institution is to serve as a <strong>marketplace</strong> — it brings together buyers who want to invest and sellers who want to liquidate or raise capital. It does <em>not</em> guarantee price increases (A), predict earnings (B), or ensure everyone profits (C). Markets facilitate transactions; outcomes depend on individual decisions and market conditions."
  },
  {
    id: 6, topic: "Supply & Demand",
    text: "ABC swimsuit manufacturers run plants day and night but cannot meet demand. If ABC cannot lift production while demand continues to rise, the price of ABC swimsuits will:",
    options: [
      "Remain constant.",
      "Decrease.",
      "Increase.",
      "Cannot forecast."
    ],
    correct: 2,
    explanation: "This is a straightforward <strong>supply and demand</strong> scenario. Supply is fixed (at capacity), while demand continues to rise (rightward shift of the demand curve). With a vertical supply curve and increasing demand, the equilibrium price must <strong>increase</strong>. This is the market's mechanism for rationing the scarce good among competing buyers."
  },
  {
    id: 7, topic: "Monetary Economics",
    text: "If the interest rates charged by banks increase from 4% to 7%, which of the following will most likely be encouraged to happen?",
    options: [
      "Businesses will borrow money from banks to invest.",
      "People will open saving accounts.",
      "People will buy houses.",
      "All of the above."
    ],
    correct: 1,
    explanation: "Higher interest rates make <strong>saving more attractive</strong> (higher returns on deposits) while making <strong>borrowing more expensive</strong>. This discourages borrowing for investment (A) and house purchases (C, which typically require mortgages). Only saving (B) is encouraged — the higher return incentivizes people to deposit money rather than spend it."
  },
  {
    id: 8, topic: "Public Economics",
    text: "Products and services supplied by government often benefit:",
    options: [
      "Firms with costs borne by consumers.",
      "Only those who pay for these products and services.",
      "Many people at a time no matter they have paid for them or not.",
      "Nobody."
    ],
    correct: 2,
    explanation: "Government-provided goods are typically <strong>public goods</strong> (national defense, roads, public health) which are <em>non-excludable</em> and <em>non-rivalrous</em>. This means many people benefit simultaneously, regardless of whether they directly paid for them. This \"free rider\" characteristic is precisely why the government provides them — private markets would under-supply these goods."
  },
  {
    id: 9, topic: "GDP Measurement",
    text: "GDP does not count illegally produced and sold items and those produced and consumed at home because:",
    options: [
      "Their quality is too low to contribute value to GDP.",
      "These items are not listed in income tax forms.",
      "The production and consumption of these items are not encouraged by the government.",
      "It is not easy to measure them."
    ],
    correct: 3,
    explanation: "The practical reason is <strong>measurement difficulty</strong>. Home production (cooking, childcare, DIY repairs) and illegal activity (black market) generate real economic value, but statisticians cannot reliably track and measure these transactions. Quality (A) is irrelevant — low-quality goods still count in GDP. Tax reporting (B) and government encouragement (C) are not the criteria for GDP inclusion."
  },
  {
    id: 10, topic: "Monopoly",
    text: "On a monopoly market, the demand function for good X is Q = 80 − P, and the monopolist's cost function is TC(Q) = Q². The monopolist can rent a technological device for a fixed cost C that would change the cost function to TC(Q) = 20Q. What is the largest amount of C the monopolist should pay?",
    options: [
      "50",
      "100",
      "150",
      "200"
    ],
    correct: 1,
    explanation: "<strong>Without device:</strong> P = 80 − Q. TR = (80 − Q)Q. MR = 80 − 2Q. MC = 2Q.<br>MR = MC → 80 − 2Q = 2Q → Q = 20, P = 60.<br>Profit₁ = 60(20) − 20² = 1,200 − 400 = <strong>800</strong><br><br><strong>With device:</strong> MC = 20. MR = MC → 80 − 2Q = 20 → Q = 30, P = 50.<br>Profit₂ = 50(30) − 20(30) − C = 1,500 − 600 − C = <strong>900 − C</strong><br><br>Device is worth it if 900 − C ≥ 800 → <strong>C ≤ 100</strong>."
  },
  {
    id: 11, topic: "Growth & Development",
    text: "What is the variable which takes the most significant role in accounting for huge differences in standards of living all over the world?",
    options: [
      "Productivity.",
      "Population.",
      "Preferences.",
      "Prices."
    ],
    correct: 0,
    explanation: "One of Mankiw's <strong>Ten Principles of Economics</strong>: a country's standard of living depends on its ability to produce goods and services — i.e., <strong>productivity</strong>. Countries with high output per worker (high productivity) enjoy higher standards of living. While population, preferences, and prices play roles, productivity is the fundamental driver of long-run differences in living standards across nations."
  },
  {
    id: 12, topic: "Money & Banking",
    text: "At the end of this school year, you need to help your parents estimate your total learning cost for the following year. When you calculate the total expenses, which function of money do you apply?",
    options: [
      "A medium of exchange.",
      "A store of value.",
      "A measure of value.",
      "All of the above."
    ],
    correct: 2,
    explanation: "When you use money to <strong>estimate or compare costs</strong> (adding up tuition, books, transport in VND), you are using money as a <strong>unit of account / measure of value</strong>. You're not exchanging money (medium of exchange) or saving it (store of value) — you're using it as a common yardstick to <em>measure and sum</em> different expenses."
  },
  {
    id: 13, topic: "Macroeconomics",
    text: "We calculate the Consumer Price Index (CPI) in order to:",
    options: [
      "Control changes in the level of wholesale prices in the economy.",
      "Monitor changes in the cost of living over time.",
      "Observe changes in the level of real GDP over time.",
      "Supervise changes in the stock market."
    ],
    correct: 1,
    explanation: "The <strong>CPI</strong> tracks the price of a fixed basket of consumer goods and services over time. Its primary purpose is to <strong>monitor changes in the cost of living</strong> — how much households must spend to maintain the same standard of living. It is used for inflation measurement, wage indexation, and social security adjustments. It does not measure wholesale prices (PPI does that), real GDP (the GDP deflator does), or stock markets."
  },
  {
    id: 14, topic: "GDP & Inflation",
    text: "From 2019 to 2020, suppose Vietnam's nominal GDP increased from $3,421 to $3,521, while the GDP Deflator rose from 262 to 270. Nominal GDP changed by ___%, the GDP Deflator changed by ___%, and real GDP changed by ___%.",
    options: [
      "2.92, 3.05, negative 0.13",
      "100, 8, positive 92",
      "2.92, 8, negative 5.08",
      "100, 3.05, positive 92"
    ],
    correct: 0,
    explanation: "<strong>%Δ Nominal GDP</strong> = (3,521 − 3,421) / 3,421 × 100 = <strong>2.92%</strong><br><strong>%Δ GDP Deflator</strong> = (270 − 262) / 262 × 100 = <strong>3.05%</strong><br><strong>%Δ Real GDP</strong> ≈ %Δ Nominal − %Δ Deflator = 2.92 − 3.05 = <strong>−0.13%</strong><br><br>This means prices rose faster than nominal output, so <em>real</em> output actually fell slightly — an important distinction for assessing true economic performance."
  },
  {
    id: 15, topic: "International Trade",
    text: "If Vietnam stopped importing mobile phones from Country A, who would be most likely to benefit?",
    options: [
      "Mobile phone manufacturers in Vietnam.",
      "Consumers in Vietnam.",
      "Mobile phone manufacturers in Country A.",
      "Both Vietnam and Country A manufacturers would gain equal benefit."
    ],
    correct: 0,
    explanation: "Import restrictions (tariffs or bans) protect <strong>domestic producers</strong> from foreign competition. Vietnamese phone manufacturers benefit because they face less competition and can charge higher prices. Vietnamese <em>consumers</em> lose (fewer choices, higher prices). Country A manufacturers lose their export market. This illustrates the <strong>protectionism trade-off</strong>: producer gains at consumer expense."
  },
  {
    id: 16, topic: "Income Distribution",
    text: "Which of the following DOES NOT contribute to income inequality?",
    options: [
      "Differences in ability and training",
      "Differences in job tastes",
      "Differences in property ownership",
      "Government transfers (transfer payments)"
    ],
    correct: 3,
    explanation: "<strong>Government transfers</strong> (welfare, pensions, unemployment benefits) are designed to <em>reduce</em> income inequality by redistributing income from higher to lower earners. They do not <em>contribute</em> to inequality — they mitigate it. In contrast, differences in ability/training (A), job preferences (B), and property ownership (C) all create or widen income gaps."

    options: [

    options: [
      "Invest in more fossil fuel plant projects.",
      "Subsidize and repurchase excess solar energy from households.",
      "Lower the fuel tax.",
      "Subsidize fossil fuel companies."
    ],
    correct: 1,
    explanation: "<strong>Subsidizing solar energy and buying back surplus</strong> directly incentivizes households to install renewable energy systems (e.g., rooftop solar panels). The feed-in tariff model has been highly effective worldwide. Options A, C, and D all support <em>fossil fuels</em>, which would make renewables relatively <em>less</em> competitive — the opposite of the goal."

    options: [
      "3",

let answered = 0, correctCount = 0;
let timerSeconds = 30 * 60, timerInterval = null, isPaused = false, noTimer = false;
let selectedMinutes = 30;
let startTime = null, elapsedAtEnd = null;

function selectTime(mins) {
  selectedMinutes = mins;
  document.querySelectorAll('.time-opt').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
}

function startQuiz(skipTimer) {
  noTimer = !!skipTimer;
  timerSeconds = selectedMinutes * 60;
  document.getElementById('timerSetup').classList.add('hidden');
  document.getElementById('quizContainer').classList.remove('hidden');
  startTime = Date.now();
  renderQuiz();
  if (!noTimer) {
    updateTimerDisplay();
    timerInterval = setInterval(tick, 1000);
  } else {
    document.getElementById('timerDisplay').textContent = '∞';
    // Start a count-up timer
    timerInterval = setInterval(() => {
      const elapsed = Math.floor((Date.now() - startTime) / 1000);
      const m = Math.floor(elapsed / 60), s = elapsed % 60;
      document.getElementById('timerDisplay').textContent = `${m}:${String(s).padStart(2,'0')}`;
    }, 1000);
  }
}

function tick() {
  if (isPaused) return;
  timerSeconds--;
  updateTimerDisplay();
  if (timerSeconds <= 0) {
    clearInterval(timerInterval);
    endByTimer();
  }
}

function updateTimerDisplay() {
  const m = Math.floor(timerSeconds / 60), s = timerSeconds % 60;
  document.getElementById('timerDisplay').textContent = `${m}:${String(s).padStart(2,'0')}`;
  const clock = document.getElementById('timerClock');
  clock.classList.remove('warning', 'danger');
  if (timerSeconds <= 60) clock.classList.add('danger');
  else if (timerSeconds <= 5 * 60) clock.classList.add('warning');
}

function togglePause() {
  isPaused = !isPaused;
  const btn = document.getElementById('pauseBtn');
  btn.innerHTML = isPaused
    ? '<svg viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21"/></svg>'
    : '<svg viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>';
}

function endByTimer() {
  elapsedAtEnd = selectedMinutes * 60;
  // Disable all unanswered options and reveal correct answers
  questions.forEach(q => {
    const card = document.getElementById(`qcard-${q.id}`);
    if (!card.classList.contains('answered-correct') && !card.classList.contains('answered-wrong')) {
      q.options.forEach((_, i) => { document.getElementById(`opt-${q.id}-${i}`).disabled = true; });
      document.getElementById(`opt-${q.id}-${q.correct}`).classList.add('show-correct');
      const expl = document.getElementById(`expl-${q.id}`);
      expl.className = 'explanation show wrong-expl';
      expl.innerHTML = `<strong>⏱ Time's up!</strong> The correct answer is <strong>${String.fromCharCode(65 + q.correct)}</strong>. ${q.explanation}`;
      card.classList.add('answered-wrong');
    }
  });
  answered = questions.length;
  updateProgress();
  showResults();
}

function getElapsed() {
  if (elapsedAtEnd !== null) return elapsedAtEnd;
  return Math.floor((Date.now() - startTime) / 1000);
}

function formatTime(sec) {
  const m = Math.floor(sec / 60), s = sec % 60;
  return `${m}m ${s}s`;
}

function renderQuiz() {
  const container = document.getElementById('quizContainer');
  let currentTopic = '', html = '';
  questions.forEach(q => {
    html += `
      <div class="q-card" id="qcard-${q.id}">
        <div class="q-header">
          <div class="q-number">${q.id}</div>
          <div class="q-topic">${q.topic}</div>
        </div>
        <div class="q-text">${q.text}</div>
        <div class="options">
          ${q.options.map((opt, i) => `
            <button class="option-btn" id="opt-${q.id}-${i}" onclick="selectAnswer(${q.id}, ${i})">
              <span class="letter">${String.fromCharCode(65 + i)}</span>
              <span>${opt}</span>
            </button>
          `).join('')}
        </div>
        <div class="explanation" id="expl-${q.id}"></div>
      </div>`;
  });
  html += `
    <div class="results-panel" id="resultsPanel">
      <h2>Quiz Complete!</h2>
      <div class="score-display" id="scoreDisplay"></div>
      <div class="score-sub" id="scoreSub"></div>
      <div class="score-row">
        <div class="score-stat green"><div class="num" id="statCorrect">0</div><div class="lbl">Correct</div></div>
        <div class="score-stat red"><div class="num" id="statWrong">0</div><div class="lbl">Incorrect</div></div>
        <div class="score-stat time"><div class="num" id="statTime">-</div><div class="lbl">Time Taken</div></div>
      </div>
      <button class="btn-restart" onclick="restartQuiz()">Try Again</button>
    </div>
    <div class="footer-note">VEO 2021 Round 1 – Practice Quiz &bull; Prepared by MeritPath</div>`;
  container.innerHTML = html;
}

function selectAnswer(qId, selected) {
  const q = questions.find(x => x.id === qId);
  const card = document.getElementById(`qcard-${qId}`);
  const expl = document.getElementById(`expl-${qId}`);
  q.options.forEach((_, i) => { document.getElementById(`opt-${qId}-${i}`).disabled = true; });
  const isCorrect = selected === q.correct;
  if (isCorrect) {
    correctCount++;
    document.getElementById(`opt-${qId}-${selected}`).classList.add('selected-correct');
    card.classList.add('answered-correct');
    expl.className = 'explanation show correct-expl';
    expl.innerHTML = `<strong>✓ Correct!</strong> ${q.explanation}`;
  } else {
    document.getElementById(`opt-${qId}-${selected}`).classList.add('selected-wrong');
    document.getElementById(`opt-${qId}-${q.correct}`).classList.add('show-correct');
    card.classList.add('answered-wrong');
    expl.className = 'explanation show wrong-expl';
    expl.innerHTML = `<strong>✗ Incorrect.</strong> The correct answer is <strong>${String.fromCharCode(65 + q.correct)}</strong>. ${q.explanation}`;
  }
  answered++;
  updateProgress();
  if (answered === questions.length) {
    clearInterval(timerInterval);
    elapsedAtEnd = getElapsed();
    setTimeout(showResults, 500);
  }
}

function updateProgress() {
  document.getElementById('progressFill').style.width = (answered / questions.length * 100) + '%';
  document.getElementById('progressText').textContent = `${answered} / ${questions.length}`;
}

function showResults() {
  const panel = document.getElementById('resultsPanel');
  const wrong = answered - correctCount;
  const pct = Math.round(correctCount / questions.length * 100);
  document.getElementById('scoreDisplay').innerHTML = `${correctCount} <span>/ ${questions.length}</span>`;
  document.getElementById('scoreSub').textContent = `${pct}% correct`;
  document.getElementById('statCorrect').textContent = correctCount;
  document.getElementById('statWrong').textContent = wrong;
  document.getElementById('statTime').textContent = formatTime(elapsedAtEnd || getElapsed());
  panel.classList.add('show');
  panel.scrollIntoView({ behavior: 'smooth', block: 'center' });
}

function restartQuiz() {
  answered = 0; correctCount = 0; elapsedAtEnd = null; isPaused = false;
  clearInterval(timerInterval);
  document.getElementById('quizContainer').classList.add('hidden');
  document.getElementById('timerSetup').classList.remove('hidden');
  document.getElementById('timerClock').classList.remove('warning','danger');
  document.getElementById('timerDisplay').textContent = '--:--';
  document.getElementById('pauseBtn').innerHTML = '<svg viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>';
  updateProgress();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
</script>
