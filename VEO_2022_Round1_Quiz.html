<style>
:root{--bg:#F2F4F3;--card:#fff;--accent:#1A3A5C;--accent-light:#E4EBF3;--accent-mid:#2E6091;--gold:#C8963E;--text:#1E1E1E;--text-muted:#6E7175;--correct:#1B7A4A;--correct-bg:#E6F5EC;--wrong:#B33A3A;--wrong-bg:#FDEAEA;--border:#D6DAE0;--radius:12px}
*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Source Sans 3',sans-serif;background:var(--bg);color:var(--text);line-height:1.6}
.hero{background:linear-gradient(135deg,#1A3A5C 0%,#0E1F33 100%);color:#fff;padding:2.5rem 1.5rem 2rem;text-align:center;position:relative}.hero::after{content:'';position:absolute;bottom:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--gold),#E8C97A,var(--gold))}.hero h1{font-family:'DM Serif Display',serif;font-size:clamp(1.7rem,5vw,2.4rem);margin-bottom:.25rem}.hero .sub{font-size:1rem;opacity:.7}.hero .badges{display:flex;gap:.5rem;justify-content:center;flex-wrap:wrap;margin-top:.8rem}.hero .badge{padding:.25rem .75rem;border-radius:20px;font-size:.78rem;font-weight:600;letter-spacing:.04em}.badge-q{background:rgba(200,150,62,.2);border:1px solid rgba(200,150,62,.4);color:#E8C97A}.badge-t{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:rgba(255,255,255,.75)}
.timer-bar{position:sticky;top:0;z-index:100;background:var(--card);border-bottom:1px solid var(--border);padding:.5rem 1.25rem;display:flex;align-items:center;gap:1rem;box-shadow:0 2px 12px rgba(0,0,0,.04)}.timer-left{display:flex;align-items:center;gap:.6rem;flex:1}.progress-track{flex:1;height:7px;background:#E4E6E9;border-radius:4px;overflow:hidden}.progress-fill{height:100%;width:0%;background:linear-gradient(90deg,var(--accent),var(--accent-mid));border-radius:4px;transition:width .4s}.progress-text{font-size:.8rem;font-weight:600;color:var(--text-muted);white-space:nowrap}.timer-clock{display:flex;align-items:center;gap:.4rem;font-size:.95rem;font-weight:700;font-variant-numeric:tabular-nums;padding:.35rem .75rem;background:var(--accent-light);border-radius:8px;color:var(--accent);min-width:115px;justify-content:center}.timer-clock svg{width:16px;height:16px;flex-shrink:0}.timer-clock.warning{background:#FFF3E0;color:#E65100;animation:pulse 1s infinite}.timer-clock.danger{background:var(--wrong-bg);color:var(--wrong);animation:pulse .5s infinite}@keyframes pulse{0%,100%{opacity:1}50%{opacity:.7}}.timer-btn{width:32px;height:32px;border-radius:8px;border:1px solid var(--border);background:var(--card);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;color:var(--text-muted)}.timer-btn:hover{background:var(--accent-light);color:var(--accent);border-color:var(--accent)}.timer-btn svg{width:14px;height:14px}
.timer-setup{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:1.75rem;margin-bottom:1.5rem;text-align:center}.timer-setup h3{font-family:'DM Serif Display',serif;font-size:1.2rem;color:var(--accent);margin-bottom:.3rem}.timer-setup p{font-size:.9rem;color:var(--text-muted);margin-bottom:1rem}.time-options{display:flex;gap:.6rem;justify-content:center;flex-wrap:wrap;margin-bottom:1rem}.time-opt{padding:.6rem 1.2rem;border-radius:10px;border:1.5px solid var(--border);background:var(--bg);cursor:pointer;font-family:inherit;font-size:.92rem;font-weight:600;color:var(--text);transition:all .2s}.time-opt:hover,.time-opt.active{border-color:var(--accent);background:var(--accent-light);color:var(--accent)}.start-btn{padding:.7rem 2.5rem;border:none;border-radius:10px;background:var(--accent);color:#fff;font-family:inherit;font-size:1rem;font-weight:600;cursor:pointer;transition:background .2s}.start-btn:hover{background:var(--accent-mid)}.no-timer-link{display:block;margin-top:.6rem;font-size:.85rem;color:var(--text-muted);cursor:pointer;text-decoration:underline;border:none;background:none;font-family:inherit}
.container{max-width:780px;margin:0 auto;padding:1.5rem 1.25rem 4rem}.section-label{font-family:'DM Serif Display',serif;font-size:1.25rem;color:var(--accent);margin:2rem 0 1rem;padding-bottom:.5rem;border-bottom:2px solid var(--accent-light)}
.q-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:1.4rem;margin-bottom:1.1rem;transition:border-color .3s,box-shadow .3s}.q-card:hover{box-shadow:0 4px 18px rgba(0,0,0,.04)}.q-card.answered-correct{border-color:var(--correct)}.q-card.answered-wrong{border-color:var(--wrong)}.q-header{display:flex;align-items:center;gap:.6rem;margin-bottom:.6rem}.q-number{width:28px;height:28px;display:inline-flex;align-items:center;justify-content:center;background:var(--accent);color:#fff;font-size:.75rem;font-weight:700;border-radius:50%;flex-shrink:0}.q-card.answered-correct .q-number{background:var(--correct)}.q-card.answered-wrong .q-number{background:var(--wrong)}.q-topic{font-size:.7rem;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--text-muted);background:#EDF0F3;padding:.12rem .5rem;border-radius:10px}.q-text{font-size:.97rem;font-weight:600;margin-bottom:.9rem;line-height:1.6}
.options{display:flex;flex-direction:column;gap:.4rem}.option-btn{display:flex;align-items:flex-start;gap:.65rem;padding:.75rem .9rem;background:var(--bg);border:1.5px solid transparent;border-radius:10px;cursor:pointer;font-size:.9rem;line-height:1.5;text-align:left;transition:all .2s;font-family:inherit;color:var(--text);width:100%}.option-btn:hover:not(:disabled){border-color:var(--accent);background:var(--accent-light)}.option-btn .letter{flex-shrink:0;width:24px;height:24px;display:flex;align-items:center;justify-content:center;border-radius:50%;background:#fff;border:1.5px solid var(--border);font-weight:700;font-size:.75rem;color:var(--text-muted);transition:all .2s}.option-btn:hover:not(:disabled) .letter{border-color:var(--accent);color:var(--accent)}.option-btn.selected-correct{background:var(--correct-bg);border-color:var(--correct)}.option-btn.selected-correct .letter{background:var(--correct);border-color:var(--correct);color:#fff}.option-btn.selected-wrong{background:var(--wrong-bg);border-color:var(--wrong)}.option-btn.selected-wrong .letter{background:var(--wrong);border-color:var(--wrong);color:#fff}.option-btn.show-correct{background:var(--correct-bg);border-color:var(--correct)}.option-btn.show-correct .letter{background:var(--correct);border-color:var(--correct);color:#fff}.option-btn:disabled{cursor:default}
.explanation{margin-top:.85rem;padding:.85rem 1rem;border-radius:10px;font-size:.88rem;line-height:1.6;display:none}.explanation.show{display:block;animation:fadeIn .3s ease}.explanation.correct-expl{background:var(--correct-bg);border-left:4px solid var(--correct);color:#155D35}.explanation.wrong-expl{background:var(--wrong-bg);border-left:4px solid var(--wrong);color:#8A2222}@keyframes fadeIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.results-panel{display:none;background:var(--card);border:2px solid var(--gold);border-radius:var(--radius);padding:2rem;text-align:center;margin-top:2rem}.results-panel.show{display:block;animation:fadeIn .4s ease}.results-panel h2{font-family:'DM Serif Display',serif;font-size:1.5rem;color:var(--accent);margin-bottom:.25rem}.score-display{font-size:3rem;font-weight:700;color:var(--accent);margin:.5rem 0}.score-display span{color:var(--text-muted);font-size:1.5rem}.score-sub{font-size:.95rem;color:var(--text-muted);margin-bottom:1.2rem}.score-row{display:flex;justify-content:center;gap:2rem;margin-bottom:1.5rem;flex-wrap:wrap}.score-stat{text-align:center}.score-stat .num{font-size:1.3rem;font-weight:700}.score-stat .lbl{font-size:.75rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:.06em}.score-stat.green .num{color:var(--correct)}.score-stat.red .num{color:var(--wrong)}.score-stat.time .num{color:var(--accent)}.btn-restart{padding:.7rem 2rem;background:var(--accent);color:#fff;border:none;border-radius:8px;font-size:1rem;font-weight:600;cursor:pointer;font-family:inherit}.btn-restart:hover{background:var(--accent-mid)}
.footer-note{text-align:center;margin-top:2rem;font-size:.82rem;color:var(--text-muted)}.hidden{display:none!important}
@media(max-width:600px){.hero{padding:2rem 1rem 1.5rem}.container{padding:1rem 1rem 3rem}.q-card{padding:1.1rem}.timer-bar{padding:.4rem .75rem;gap:.5rem}}
</style>

<div class="hero"><h1>Vietnam Economics Olympiad 2022</h1><p class="sub">Round 1 – Practice Quiz</p><div class="badges"><div class="badge badge-q">28 MCQ QUESTIONS</div><div class="badge badge-t">⏱ TIMED</div></div></div>
<div class="timer-bar"><div class="timer-left"><div class="progress-track"><div class="progress-fill" id="progressFill"></div></div><div class="progress-text" id="progressText">0 / 28</div></div><div class="timer-clock" id="timerClock"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg><span id="timerDisplay">--:--</span></div><button class="timer-btn" id="pauseBtn" title="Pause" onclick="togglePause()"><svg viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg></button></div>
<div class="container"><div id="timerSetup" class="timer-setup"><h3>Set Your Timer</h3><p>28 questions. Choose a time limit or go untimed.</p><div class="time-options"><button class="time-opt" onclick="selectTime(20)">20 min</button><button class="time-opt" onclick="selectTime(30)">30 min</button><button class="time-opt active" onclick="selectTime(45)">45 min</button><button class="time-opt" onclick="selectTime(60)">60 min</button></div><button class="start-btn" onclick="startQuiz()">Start Quiz</button><button class="no-timer-link" onclick="startQuiz(true)">Practice without timer</button></div><div id="quizContainer" class="hidden"></div></div>
<script>
const Q=[
{id:1,t:"Opportunity Cost",q:"Which of the following would NOT be an opportunity cost of your summer holiday to Nha Trang?",o:["The amount of money you could have earned if you took a summer job instead","The cost of the airline ticket(s) to Nha Trang","The cost of the ticket to Tri Nguyen Aquarium in Nha Trang","The rent you pay for your accommodation in Hanoi even though you do not stay there during the holiday"],c:3,e:"Rent in Hanoi is a <strong>sunk cost</strong> — you pay it regardless of whether you go to Nha Trang or not. It cannot be avoided by choosing differently, so it is NOT an opportunity cost. The foregone wages (A), flight cost (B), and aquarium ticket (C) are all costs incurred <em>because</em> of the trip."},
{id:2,t:"History of Thought",q:"The economic philosopher recognized as the founder of modern Macroeconomics?",o:["Nicolas Gregory Mankiw","Milton Friedman","Adam Smith","John Maynard Keynes"],c:3,e:"<strong>John Maynard Keynes</strong> (1883–1946) is widely considered the founder of modern macroeconomics, primarily through his 1936 work <em>The General Theory of Employment, Interest and Money</em>. Adam Smith founded classical economics; Friedman led the monetarist school; Mankiw is a contemporary textbook author."},
{id:3,t:"Growth",q:"If a country's real GDP grows at an annual rate of 2%, after roughly _____ years, the country's real GDP will double.",o:["25","30","35","40"],c:2,e:"The <strong>Rule of 70</strong>: doubling time ≈ 70 ÷ growth rate. At 2% growth: 70 ÷ 2 = <strong>35 years</strong>. This is a quick approximation derived from the properties of compound growth (ln2 ≈ 0.693)."},
{id:4,t:"Growth",q:"In a full-employment economy, a high rate of growth requires:",o:["A low rate of saving and a low rate of investment","A high rate of saving and a low rate of investment","A high rate of saving and a high rate of investment","A low rate of saving and a high rate of investment"],c:2,e:"Long-run economic growth requires <strong>capital accumulation</strong>, which is funded by saving. In a closed economy, S = I: high saving enables high investment in physical and human capital, driving productivity growth. This is a core insight of the <strong>Solow growth model</strong>."},
{id:5,t:"Game Theory",q:"<table style='border-collapse:collapse;margin:.5rem 0;font-size:.85rem'><tr><td></td><td></td><td colspan='2' style='text-align:center;font-weight:700;padding:.3rem'>B's price policy</td></tr><tr><td></td><td></td><td style='border:1px solid #ccc;padding:.4rem .8rem;text-align:center'>High</td><td style='border:1px solid #ccc;padding:.4rem .8rem;text-align:center'>Low</td></tr><tr><td rowspan='2' style='font-weight:700;padding-right:.5rem'>A's price</td><td style='border:1px solid #ccc;padding:.4rem .8rem'>High</td><td style='border:1px solid #ccc;padding:.4rem .8rem;text-align:center'>A:20, B:20</td><td style='border:1px solid #ccc;padding:.4rem .8rem;text-align:center'>A:10, B:30</td></tr><tr><td style='border:1px solid #ccc;padding:.4rem .8rem'>Low</td><td style='border:1px solid #ccc;padding:.4rem .8rem;text-align:center'>A:30, B:10</td><td style='border:1px solid #ccc;padding:.4rem .8rem;text-align:center'>A:15, B:15</td></tr></table>The Nash equilibrium in the game is:",o:["(High, High)","(High, Low)","(Low, High)","(Low, Low)"],c:3,e:"This is a <strong>Prisoner's Dilemma</strong>. Check for dominant strategies:<br>• A: Low dominates High (30 > 20 if B plays High; 15 > 10 if B plays Low)<br>• B: Low dominates High (30 > 20 if A plays High; 15 > 10 if A plays Low)<br><br>Both play Low → <strong>(Low, Low)</strong> with payoffs (15, 15). Both could be better off at (High, High) = (20, 20), but neither can unilaterally deviate."},
{id:6,t:"Game Theory",q:"Choose the statement which is NOT TRUE:",o:["Common card games are an example of game theory.","Perfect competition is an example of game theory.","One example of game theory is Oligopoly.","An example of game theory is Auctions."],c:1,e:"In <strong>perfect competition</strong>, firms are <em>price takers</em> — they have no strategic interaction because no individual firm can influence the market price. Game theory studies <strong>strategic interdependence</strong>, which exists in oligopoly (C), card games (A), and auctions (D), but not in perfect competition."},
{id:7,t:"Banking",q:"What is TRUE for a bank in a fractional-reserve banking system?",o:["The bank does not make loans.","The bank keeps only a fraction of its deposits in reserve.","The bank holds only a fraction of its reserves in deposits.","The bank does not receive deposits."],c:1,e:"<strong>Fractional-reserve banking</strong> means banks hold only a <em>fraction</em> of deposits as reserves and lend out the rest. This is the foundation of the <strong>money multiplier</strong> process — each loan creates new deposits, expanding the money supply beyond the initial deposit."},
{id:8,t:"Costs",q:"The costs of producing 1, 2, 3, and 4 units of output are $5, $8, $10, and $11 respectively. The marginal cost of producing the second unit is:",o:["$5","$4","$3","$2"],c:2,e:"<strong>Marginal cost</strong> = change in total cost from producing one more unit.<br><br>MC₂ = TC(2) − TC(1) = $8 − $5 = <strong>$3</strong>.<br><br>Note: MC is declining here (MC₃ = $2, MC₄ = $1), suggesting increasing returns to scale at these output levels."},
{id:9,t:"Costs",q:"A firm has the cost function TC = 3Q + 5. The firm's average cost would be:",o:["3","4","5","3 + 5/Q"],c:3,e:"<strong>Average cost</strong> = TC / Q = (3Q + 5) / Q = <strong>3 + 5/Q</strong>.<br><br>Note that AC decreases as Q increases (the fixed cost 5 is spread over more units). AC approaches 3 (the marginal cost) as Q → ∞. The firm has constant MC = 3 and fixed cost = 5."},
{id:10,t:"Profit Max",q:"Company ABC's demand schedule:<br><table style='border-collapse:collapse;margin:.4rem 0;font-size:.85rem'><tr><td style='border:1px solid #ccc;padding:.25rem .5rem'>P ($/kg)</td><td style='border:1px solid #ccc;padding:.25rem .5rem'>6.5</td><td style='border:1px solid #ccc;padding:.25rem .5rem'>5.5</td><td style='border:1px solid #ccc;padding:.25rem .5rem'>4.8</td><td style='border:1px solid #ccc;padding:.25rem .5rem'>4.3</td><td style='border:1px solid #ccc;padding:.25rem .5rem'>3.9</td></tr><tr><td style='border:1px solid #ccc;padding:.25rem .5rem'>Q (kg)</td><td style='border:1px solid #ccc;padding:.25rem .5rem'>100</td><td style='border:1px solid #ccc;padding:.25rem .5rem'>150</td><td style='border:1px solid #ccc;padding:.25rem .5rem'>200</td><td style='border:1px solid #ccc;padding:.25rem .5rem'>250</td><td style='border:1px solid #ccc;padding:.25rem .5rem'>300</td></tr></table>Unit cost = $2.5/kg. Sells in sacks of 50 kg. What is the optimal quantity?",o:["100 kg","150 kg","200 kg","250 kg"],c:2,e:"Calculate <strong>profit = TR − TC</strong> at each quantity:<br>Q=100: 650 − 250 = 400<br>Q=150: 825 − 375 = 450<br>Q=200: 960 − 500 = <strong>460</strong> ← max<br>Q=250: 1,075 − 625 = 450<br>Q=300: 1,170 − 750 = 420<br><br>Profit is maximized at <strong>200 kg</strong> (4 sacks of 50 kg)."},
{id:11,t:"Cost Structure",q:"Firms A and B produce the same quantity at the same total cost. Firm A has lower fixed cost and higher variable cost than B. Which statement is correct?",o:["If each produces less, their total costs will be equal.","If each produces more, their total costs will be equal.","If each produces less, firm A will have lower total cost.","If each produces more, firm A will have lower total cost."],c:2,e:"Currently: TC_A = TC_B, but FC_A < FC_B and VC_A > VC_B.<br><br>If both <strong>reduce output</strong>, variable costs fall. Since A has higher VC (higher marginal cost), A's VC drops by more per unit reduction. A's TC falls more → <strong>A ends up with lower total cost</strong>.<br><br>Conversely, if both increase output, A's costs would rise faster (higher MC), making B cheaper."},
{id:12,t:"Supply & Demand",q:"From the supply-demand graph, when the price is $8, there is:",o:["A surplus of 400 units","A shortage of 400 units","A surplus of 200 units","A shortage of 200 units"],c:2,e:"At $8 (above equilibrium): <strong>quantity supplied > quantity demanded</strong>, creating a <strong>surplus</strong>. Reading from the graph: Q<sub>S</sub> ≈ 400, Q<sub>D</sub> ≈ 200, so the surplus is approximately <strong>200 units</strong>. Sellers will lower prices to clear the excess inventory."},
{id:13,t:"Supply & Demand",q:"When supply increases, the price _____ and the quantity demanded _____.",o:["decreases, increases","increases, decreases","decreases, decreases","increases, increases"],c:0,e:"A supply increase <strong>shifts the supply curve rightward</strong>. At the new equilibrium: <strong>price falls</strong> and <strong>quantity increases</strong>. The lower price causes a <em>movement along</em> the demand curve (increase in quantity demanded). Note: demand itself doesn't change — only the quantity demanded."},
{id:14,t:"Demand Shifts",q:"5 million face masks were demanded at $2 in 2020. In 2021, only 4.5 million at the same price. Which would most likely NOT cause this decrease?",o:["A decreased risk of contracting COVID-19 without masks","A decrease in the price of materials used for producing face masks","Abolition of mask requirement in public places","A decrease in consumers' income if face masks are a normal good"],c:1,e:"A <strong>decrease in input costs</strong> (B) affects the <em>supply</em> side, not demand. It would shift supply rightward (more masks produced at each price), but would not reduce the quantity demanded at a given price. Options A, C, and D all shift the <em>demand curve</em> leftward."},
{id:15,t:"Market Structure",q:"Which statements are correct for BOTH a monopolist and a perfectly competitive firm?<br>i) Firm maximizes profit by equating MR = MC<br>ii) Firm maximizes profit by equating P = MC<br>iii) MR curve lies below the demand curve<br>iv) Average revenue equals price",o:["i) and iv) only","i), ii), and iv) only","i), iii), and iv) only","i), ii), iii), and iv)"],c:0,e:"<strong>i) MR = MC:</strong> True for both — the universal profit-maximization rule. ✓<br><strong>ii) P = MC:</strong> True only for competitive firms (monopolists set MR = MC, and MR < P). ✗<br><strong>iii) MR < demand:</strong> True only for monopolists (for competitive firms, MR = P = demand). ✗<br><strong>iv) AR = P:</strong> True for both (AR = TR/Q = P·Q/Q = P). ✓"},
{id:16,t:"Externalities",q:"Antipollution policies include:",o:["Legislated standards","Emissions fees or taxes","Market for pollution rights","All of the answers mentioned"],c:3,e:"All three are valid approaches to reducing pollution: <strong>command-and-control</strong> (A: emission standards), <strong>Pigouvian taxes</strong> (B: making polluters pay), and <strong>cap-and-trade</strong> (C: tradeable pollution permits). Modern environmental policy typically uses a mix of all three approaches."},
{id:17,t:"Labor",q:"Which of the following people is considered unemployed?",o:["An's grandmother, who is too old to work","Phuong is not working because she is attending college","Binh was made redundant during COVID-19 and has applied for jobs recently","Tuan has dropped out of school but does not want to work"],c:2,e:"To be <strong>unemployed</strong>, a person must be: (1) not working, (2) available for work, and (3) <strong>actively seeking employment</strong>. Only Binh meets all three criteria. An's grandmother is <em>not in the labor force</em> (retired); Phuong is <em>not in the labor force</em> (student); Tuan is a <em>discouraged worker</em> (not actively seeking)."},
{id:18,t:"CPI & Inflation",q:"As the consumer price index increases, the typical household in Vietnam:",o:["Can spend fewer VND to keep the same living standard","Has to spend more VND to keep the same living standard","Finds that living standard is not affected","Can save more to offset the effects of rising prices"],c:1,e:"The CPI measures the cost of a fixed basket of goods. When CPI rises, the <strong>same basket costs more</strong> — households must spend more VND to maintain their living standard. This is the definition of <strong>inflation eroding purchasing power</strong>."},
{id:19,t:"Game Theory",q:"Mrs. Nobi lets Nobita and Doraemon share 100 Dorayaki cakes. Nobita proposes how many to give Doraemon (integer 1–100), keeping the rest. Doraemon accepts or rejects; if rejected, both get nothing. One round only, no negotiation. How many Nash equilibria?",o:["0","1","2","100"],c:3,e:"This is an <strong>ultimatum game</strong>. For any offer x ∈ {1, ..., 100}, there exists a NE:<br><br>Doraemon's strategy: \"accept if offered ≥ x, reject otherwise.\" Given this, Nobita's best response is to offer exactly x. Given Nobita offers x, Doraemon accepts (x > 0).<br><br>Each threshold x = 1, 2, ..., 100 yields a distinct NE → <strong>100 Nash equilibria</strong>. (Only x = 1 is <em>subgame perfect</em>.)"},
{id:20,t:"Fiscal Policy",q:"Which of the following would result in the greatest increase in the economy's output?",o:["A $50M reduction in taxes","A $50M increase in taxes","A $50M reduction in government spending","A $50M increase in government spending"],c:3,e:"The <strong>government spending multiplier</strong> = 1/(1 − MPC) is larger than the <strong>tax multiplier</strong> = MPC/(1 − MPC). A $50M increase in G directly adds to aggregate demand and gets multiplied. A tax cut of the same amount is partially saved, so its effect is smaller. Tax increases and spending cuts both <em>reduce</em> output."},
{id:21,t:"Labor",q:"The term that describes the deviation of unemployment from its natural rate is:",o:["Frictional unemployment","Cyclical unemployment","The unnatural rate of unemployment","Structural unemployment"],c:1,e:"<strong>Cyclical unemployment</strong> = actual unemployment − natural rate. It rises during recessions (positive deviation) and falls during booms (negative deviation). Frictional and structural unemployment together make up the natural rate itself."},
{id:22,t:"Money",q:"For an asset to become the medium of exchange, it must necessarily:",o:["Be widely accepted","Be declared a legal tender by the government","Have intrinsic value","Be both widely accepted and declared legal tender"],c:0,e:"The essential requirement is <strong>wide acceptance</strong>. If people accept an asset in exchange for goods and services, it functions as money — regardless of government declaration or intrinsic value. Historically, commodities (shells, beads, cigarettes in prisons) served as money without government backing."},
{id:23,t:"Money",q:"What is TRUE about \"Fiat money\"?",o:["Has value in exchange equal to its intrinsic value","Is backed by gold","Is backed by silver","Is money that does not contain intrinsic value"],c:3,e:"<strong>Fiat money</strong> (Latin: \"let it be done\") has no intrinsic value — it is not backed by gold, silver, or any commodity. Its value comes from <strong>government decree</strong> (legal tender laws) and <strong>public trust</strong>. All modern currencies (USD, VND, EUR) are fiat money."},
{id:24,t:"CPI",q:"When calculating the CPI, pork is given greater weight than beef if:",o:["Consumers buy more pork than beef","The price of pork is higher than the price of beef","It costs more to produce pork than beef","Pork is more readily available than beef"],c:0,e:"CPI weights reflect <strong>typical household spending patterns</strong>. If consumers spend more on pork (buy more of it), pork gets a larger weight in the basket. The weight is based on <em>expenditure share</em>, not production cost, individual price, or availability."},
{id:25,t:"Consumer Theory",q:"Nam consumes only rice (normal good) and noodles (inferior good). When his income increases, he consumes:",o:["More of both goods","More rice and less noodles","More noodles and less rice","More rice, but the impact on noodles is ambiguous"],c:1,e:"By definition: <strong>normal good</strong> → demand increases with income; <strong>inferior good</strong> → demand decreases with income. So when income rises: rice consumption <strong>increases</strong> (normal) and noodle consumption <strong>decreases</strong> (inferior)."},
{id:26,t:"Consumer Theory",q:"Relative prices of X and Y are 2:3. Minh consumes quantities where MUx/MUy = 3:2. What should Minh do to maximize utility?",o:["Consume more X and less Y","Consume more Y and less X","Keep the same quantities — already maximizing","Indeterminate from the given information"],c:0,e:"Compare <strong>marginal utility per dollar</strong>:<br><br>MU<sub>X</sub>/P<sub>X</sub> = 3/2 = 1.5<br>MU<sub>Y</sub>/P<sub>Y</sub> = 2/3 ≈ 0.67<br><br>Since MU<sub>X</sub>/P<sub>X</sub> > MU<sub>Y</sub>/P<sub>Y</sub>, Minh gets more utility per dollar from X. He should <strong>consume more X and less Y</strong> until the marginal utilities per dollar equalize (equi-marginal principle)."},
{id:27,t:"Macroeconomics",q:"What is TRUE for a closed economy which has positive investment and a government deficit?",o:["Both private and public saving are positive","Private saving is positive while public saving is negative","Private saving is negative while public saving is positive","Both private and public saving are negative"],c:1,e:"Government deficit means G > T → <strong>public saving = T − G < 0</strong> (negative).<br><br>In a closed economy: S = I, where S = S<sub>private</sub> + S<sub>public</sub>. Since I > 0, total S > 0. With S<sub>public</sub> < 0, we need S<sub>private</sub> > |S<sub>public</sub>| > 0.<br><br>Therefore: <strong>private saving is positive, public saving is negative</strong>."},
{id:28,t:"GDP",q:"<table style='border-collapse:collapse;margin:.4rem 0;font-size:.85rem'><tr style='font-weight:700'><td style='border:1px solid #ccc;padding:.25rem .5rem'>Year</td><td style='border:1px solid #ccc;padding:.25rem .5rem'>P_A</td><td style='border:1px solid #ccc;padding:.25rem .5rem'>Q_A</td><td style='border:1px solid #ccc;padding:.25rem .5rem'>P_B</td><td style='border:1px solid #ccc;padding:.25rem .5rem'>Q_B</td></tr><tr><td style='border:1px solid #ccc;padding:.25rem .5rem'>2010</td><td style='border:1px solid #ccc;padding:.25rem .5rem'>$1</td><td style='border:1px solid #ccc;padding:.25rem .5rem'>100</td><td style='border:1px solid #ccc;padding:.25rem .5rem'>$4</td><td style='border:1px solid #ccc;padding:.25rem .5rem'>50</td></tr><tr><td style='border:1px solid #ccc;padding:.25rem .5rem'>2011</td><td style='border:1px solid #ccc;padding:.25rem .5rem'>$2</td><td style='border:1px solid #ccc;padding:.25rem .5rem'>200</td><td style='border:1px solid #ccc;padding:.25rem .5rem'>$5</td><td style='border:1px solid #ccc;padding:.25rem .5rem'>100</td></tr><tr><td style='border:1px solid #ccc;padding:.25rem .5rem'>2012</td><td style='border:1px solid #ccc;padding:.25rem .5rem'>$3</td><td style='border:1px solid #ccc;padding:.25rem .5rem'>300</td><td style='border:1px solid #ccc;padding:.25rem .5rem'>$6</td><td style='border:1px solid #ccc;padding:.25rem .5rem'>150</td></tr></table>Base year is 2010. What are nominal GDP in 2010, 2011, 2012?",o:["300; 600; 1,200","300; 700; 1,300","300; 900; 1,800","300; 800; 1,500"],c:2,e:"<strong>Nominal GDP</strong> = Σ(current price × current quantity):<br><br>2010: (1×100) + (4×50) = 100 + 200 = <strong>$300</strong><br>2011: (2×200) + (5×100) = 400 + 500 = <strong>$900</strong><br>2012: (3×300) + (6×150) = 900 + 900 = <strong>$1,800</strong><br><br>Note: <em>real</em> GDP would use base-year (2010) prices instead."}
];
const N=Q.length;let ans=0,cor=0,tSec=45*60,tInt=null,paused=false,noT=false,selMin=45,startT=null,endEl=null;
function selectTime(m){selMin=m;document.querySelectorAll('.time-opt').forEach(b=>b.classList.remove('active'));event.target.classList.add('active')}
function startQuiz(skip){noT=!!skip;tSec=selMin*60;document.getElementById('timerSetup').classList.add('hidden');document.getElementById('quizContainer').classList.remove('hidden');startT=Date.now();renderQuiz();if(!noT){updTD();tInt=setInterval(tick,1000)}else{document.getElementById('timerDisplay').textContent='∞';tInt=setInterval(()=>{const e=Math.floor((Date.now()-startT)/1000),m=Math.floor(e/60),s=e%60;document.getElementById('timerDisplay').textContent=m+':'+String(s).padStart(2,'0')},1000)}}
function tick(){if(!paused){tSec--;updTD();if(tSec<=0){clearInterval(tInt);endTimer()}}}
function updTD(){const m=Math.floor(tSec/60),s=tSec%60;document.getElementById('timerDisplay').textContent=m+':'+String(s).padStart(2,'0');const c=document.getElementById('timerClock');c.classList.remove('warning','danger');if(tSec<=60)c.classList.add('danger');else if(tSec<=300)c.classList.add('warning')}
function togglePause(){paused=!paused;document.getElementById('pauseBtn').innerHTML=paused?'<svg viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21"/></svg>':'<svg viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>'}
function endTimer(){endEl=selMin*60;Q.forEach(q=>{const cd=document.getElementById('qc-'+q.id);if(!cd.classList.contains('answered-correct')&&!cd.classList.contains('answered-wrong')){q.o.forEach((_,i)=>{document.getElementById('o-'+q.id+'-'+i).disabled=true});document.getElementById('o-'+q.id+'-'+q.c).classList.add('show-correct');const e=document.getElementById('ex-'+q.id);e.className='explanation show wrong-expl';e.innerHTML="<strong>⏱ Time's up!</strong> Correct: <strong>"+String.fromCharCode(65+q.c)+"</strong>. "+q.e;cd.classList.add('answered-wrong')}});ans=N;updP();showRes()}
function renderQuiz(){const ct=document.getElementById('quizContainer');let h='';Q.forEach(q=>{h+=`<div class="q-card" id="qc-${q.id}"><div class="q-header"><div class="q-number">${q.id}</div><div class="q-topic">${q.t}</div></div><div class="q-text">${q.q}</div><div class="options">${q.o.map((op,i)=>`<button class="option-btn" id="o-${q.id}-${i}" onclick="sel(${q.id},${i})"><span class="letter">${String.fromCharCode(65+i)}</span><span>${op}</span></button>`).join('')}</div><div class="explanation" id="ex-${q.id}"></div></div>`});h+=`<div class="results-panel" id="resP"><h2>Quiz Complete!</h2><div class="score-display" id="scD"></div><div class="score-sub" id="scS"></div><div class="score-row"><div class="score-stat green"><div class="num" id="stC">0</div><div class="lbl">Correct</div></div><div class="score-stat red"><div class="num" id="stW">0</div><div class="lbl">Incorrect</div></div><div class="score-stat time"><div class="num" id="stT">-</div><div class="lbl">Time</div></div></div><button class="btn-restart" onclick="restart()">Try Again</button></div><div class="footer-note">VEO 2022 Round 1 – Practice Quiz • Prepared by MeritPath</div>`;ct.innerHTML=h}
function sel(qId,s){const q=Q.find(x=>x.id===qId),cd=document.getElementById('qc-'+qId),ex=document.getElementById('ex-'+qId);q.o.forEach((_,i)=>{document.getElementById('o-'+qId+'-'+i).disabled=true});if(s===q.c){cor++;document.getElementById('o-'+qId+'-'+s).classList.add('selected-correct');cd.classList.add('answered-correct');ex.className='explanation show correct-expl';ex.innerHTML='<strong>✓ Correct!</strong> '+q.e}else{document.getElementById('o-'+qId+'-'+s).classList.add('selected-wrong');document.getElementById('o-'+qId+'-'+q.c).classList.add('show-correct');cd.classList.add('answered-wrong');ex.className='explanation show wrong-expl';ex.innerHTML='<strong>✗ Incorrect.</strong> Correct: <strong>'+String.fromCharCode(65+q.c)+'</strong>. '+q.e}ans++;updP();if(ans===N){clearInterval(tInt);endEl=Math.floor((Date.now()-startT)/1000);setTimeout(showRes,500)}}
function updP(){document.getElementById('progressFill').style.width=(ans/N*100)+'%';document.getElementById('progressText').textContent=ans+' / '+N}
function showRes(){const p=document.getElementById('resP');document.getElementById('scD').innerHTML=cor+' <span>/ '+N+'</span>';document.getElementById('scS').textContent=Math.round(cor/N*100)+'% correct';document.getElementById('stC').textContent=cor;document.getElementById('stW').textContent=ans-cor;const el=endEl||Math.floor((Date.now()-startT)/1000);document.getElementById('stT').textContent=Math.floor(el/60)+'m '+el%60+'s';p.classList.add('show');p.scrollIntoView({behavior:'smooth',block:'center'})}
function restart(){ans=0;cor=0;endEl=null;paused=false;clearInterval(tInt);document.getElementById('quizContainer').classList.add('hidden');document.getElementById('timerSetup').classList.remove('hidden');document.getElementById('timerClock').classList.remove('warning','danger');document.getElementById('timerDisplay').textContent='--:--';document.getElementById('pauseBtn').innerHTML='<svg viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>';updP();window.scrollTo({top:0,behavior:'smooth'})}
</script>
</body>
